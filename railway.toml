[build]
builder = "nixpacks"

[deploy]
startCommand = "python main.py"
healthcheckPath = "/health"
# Warm-up de 538 símbolos (700 candles cada) leva ~3-4 min no cold start.
# 300s = 5 minutos de janela — suficiente para warm-up completo + 1 throttle da Binance.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
